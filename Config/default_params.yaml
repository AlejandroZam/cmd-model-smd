model:
  mass: 1.0
  damping: 0.2
  stiffness: 4.0
  initial_position: 1.0
  initial_velocity: 0.0
  report_rate_hz: 10.0

noise:
  force:
    distribution: gaussian
    mean: 0.0
    stddev: 0.01
  measurement:
    distribution: gaussian
    mean: 0.0
    stddev: 0.001

output:
  signals: [t, pos, vel, pos_noisy]
